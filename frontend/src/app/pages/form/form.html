<main>
    <h1>Car Form</h1>

    <form>

        <label>Brand
            <select name="brandId" id="brandId">
                <option value="a">Brand</option>
            </select>
        </label>

        <label>Model
            <select name="modelId" id="modelId">
                <option value="a">Model</option>
            </select>
        </label>

        <label>Registration Date
            <input type="date">
        </label>

        <label>Mileage
            <input type="number">
        </label>

        <label>Currency
            <select name="currency" id="currency">
                @for (currency of currencies; track $index) {
                    <option>{{currency}}</option>
                }
            </select>
        </label>

        <label>Price
            <input type="number">
        </label>

        <label>Manufacture Year
            <input type="number">
        </label>

        <label>Availability
            <input type="checkbox">
        </label>

        <label>Color
            <input type="text">
        </label>

        <label>Description
            <textarea name="description" id="description"></textarea>
        </label>

        <label>License Plate
            <input type="text">
        </label>

    </form>
</main>
